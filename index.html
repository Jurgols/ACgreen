<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Newsreader:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e2e2e2;
      --bg: #fafafa;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 520px;
      width: 100%;
      animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    /* Replace this SVG with an <img src="logo.png"> if you have one */
    .logo svg {
      width: 28px;
      height: 28px;
      fill: var(--bg);
    }

    /* ── Typography ── */
    h1 {
      font-family: 'Newsreader', serif;
      font-weight: 400;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      line-height: 1.3;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    /* ── Link / CTA ── */
    .links {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding-bottom: 2px;
      border-bottom: 1.5px solid var(--border);
      transition: border-color 0.2s;
    }

    .links a:hover {
      border-color: var(--text);
    }

    /* ── Footer ── */
    footer {
      margin-top: 5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <!-- LOGO: Replace the div below with -->
    <div class="logo">
       <img src="ACgreen.png" alt="Logo" class="logo">
    </div>

    <h1>Your Project Name</h1>

    <p>
      A short description of what you're building. Keep it simple —
      one or two sentences is all you need.
    </p>

    <div class="links">
      <a href="https://github.com/yourusername">GitHub</a>
      <a href="mailto:you@example.com">Contact</a>
      <a href="#">Docs</a>
    </div>

    <footer>
      &copy; 2026 Your Name
    </footer>
  </main>
</body>
</html>
